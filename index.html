<!DOCTYPE html><html lang='da'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>BilPortal Danmark V10 Pro</title><style>body{font-family:Segoe UI,sans-serif;margin:0;background:#f3f6fb}header{background:#0f172a;color:#fff;padding:20px;text-align:center}.wrap{max-width:1400px;margin:auto;padding:20px}.card{background:#fff;padding:20px;border-radius:14px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}input,select{width:100%;padding:10px}.btn{background:#2563eb;color:#fff;border:0;padding:12px 18px;border-radius:8px}.car{background:#eefcff;padding:14px;border-radius:10px;margin-top:10px}.dark{background:#111827;color:#eee}.dark .card{background:#1f2937}.dark .car{background:#263548}.fav{float:right} @media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><header><h1>🚗 BilPortal Danmark V10 Pro</h1><button class='btn' onclick='toggleTheme()'>🌙 / ☀️ Tema</button></header><div class='wrap'><div class='card'><div class='grid'><div><label>Km/år <span id=yv>20000</span></label><input id=year type=range min=0 max=100000 step=1000 value=20000 oninput='yv.innerText=value'><label>Budget</label><input id=budget value=450000></div><div><label>Personer</label><select id=people><option>1</option><option>2</option><option>3</option><option>4</option><option selected>5</option><option>6</option><option>7</option></select><label>Drivlinje</label><select id=fuel><option>Ligegyldig</option><option>Elbil</option><option>Hybrid</option><option>Benzin</option><option>Diesel</option></select></div><div><label>Biltype</label><select id=body><option>Ligegyldig</option><option>SUV</option><option>Stationcar</option><option>Sedan</option></select><label>Træk</label><select id=tow><option>Ingen</option><option>Trailer</option><option>Campingvogn</option></select></div><div><label>Køb/Leasing</label><select id=mode><option>Køb</option><option>Leasing</option></select><label>Månedsbudget</label><input id=month value=5000></div></div><br><button class='btn' onclick='searchCars()'>Find min bil</button><button class='btn' onclick='showFavs()'>❤ Favoritter</button><div id=advice></div><div id=results></div></div></div><script>const cars=[['Tesla','Model Y','Elbil','SUV',339990,1600],['Tesla','Model 3','Elbil','Sedan',299990,1000],['Skoda','Enyaq','Elbil','SUV',349995,1200],['Skoda','Elroq','Elbil','SUV',279995,1200],['VW','ID.4','Elbil','SUV',329995,1400],['VW','Passat','Diesel','Stationcar',439990,2000],['Skoda','Octavia','Diesel','Stationcar',299995,1800],['Toyota','Corolla Hybrid','Hybrid','Stationcar',319990,1300],['Toyota','RAV4 Hybrid','Hybrid','SUV',419990,1500],['Ford','Kuga Hybrid','Hybrid','SUV',359990,1500],['Peugeot','3008','Benzin','SUV',369990,1400],['Peugeot','5008','Benzin','SUV',389990,1500],['Citroen','C5 Aircross','Hybrid','SUV',389990,1500],['Renault','Scenic E-Tech','Elbil','SUV',329990,1100],['Renault','Austral','Hybrid','SUV',379990,1500],['Cupra','Born','Elbil','Sedan',299990,1000],['Cupra','Tavascan','Elbil','SUV',399990,1500],['Mazda','CX-5','Benzin','SUV',399990,2000],['Suzuki','S-Cross','Benzin','SUV',269990,1500],['Dacia','Jogger','Benzin','Stationcar',249990,1200]];function score(c){let s=50;let km=+year.value;if(c[2]=='Elbil'&&km<40000)s+=20;if(c[2]=='Diesel'&&km>40000)s+=20;if(body.value=='Ligegyldig'||body.value==c[3])s+=10;if(tow.value=='Campingvogn'&&c[5]>=1500)s+=10;return s;}function fav(name){let f=JSON.parse(localStorage.getItem('favs')||'[]');if(!f.includes(name))f.push(name);localStorage.setItem('favs',JSON.stringify(f));alert('Gemt som favorit');}function showFavs(){alert((JSON.parse(localStorage.getItem('favs')||'[]')).join('\n')||'Ingen favoritter');}function toggleTheme(){document.body.classList.toggle('dark');}function searchCars(){let km=+year.value;advice.innerHTML='<div class=car>🤖 Rådgiver: '+(km<30000?'Elbil eller hybrid anbefales.':'Diesel eller stærk hybrid kan være relevant.')+'</div>';let r=cars.filter(c=>c[4]<=+budget.value);if(fuel.value!='Ligegyldig')r=r.filter(c=>c[2]==fuel.value);r.sort((a,b)=>score(b)-score(a));results.innerHTML=r.map((c,i)=>`<div class='car'><span class='fav'><button onclick="fav('${c[0]} ${c[1]}')">❤</button></span><h3>#${i+1} ${c[0]} ${c[1]}</h3><p>${c[2]} · ${c[3]}</p><p>Pris: ${c[4].toLocaleString('da-DK')} kr.</p><p>Træk: ${c[5]} kg</p><p><b>Matchscore ${score(c)}/100</b></p><p>✅ Passer til dine filtre</p><p><a target='_blank' href='https://www.google.com/search?q=${encodeURIComponent(c[0]+' '+c[1])}'>🌐 Officiel side</a> | <a target='_blank' href='https://www.google.com/search?q=${encodeURIComponent(c[0]+' '+c[1]+' FDM test')}'>🧪 FDM test</a> | <a target='_blank' href='https://www.google.com/search?q=${encodeURIComponent(c[0]+' '+c[1]+' Bilmagasinet')}'>📰 Bilmagasinet</a></p></div>`).join('');}</script></body></html>
