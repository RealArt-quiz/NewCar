<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilrådgiver Danmark</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>🚗 Bilrådgiver Danmark</h1>
    <p>Svar på spørgsmålene og få de bedste bilanbefalinger.</p>
</header>

<main class="container">

<section class="question-card">
    <h2>📍 Kørsel</h2>

    <label for="commute">Kilometer til arbejde pr. dag</label>
    <input type="range" id="commute" min="0" max="200" value="25">
    <span id="commuteValue">25 km</span>

    <label for="yearlyKm">Kilometer pr. år</label>
    <input type="range" id="yearlyKm" min="0" max="100000" step="1000" value="20000">
    <span id="yearlyKmValue">20.000 km</span>
</section>

<section class="question-card">
    <h2>💰 Økonomi</h2>

    <label>
        <input type="radio" name="method" value="buy" checked>
        Køb
    </label>

    <label>
        <input type="radio" name="method" value="lease">
        Leasing
    </label>

    <div id="buySection">
        <label>Budget (kr.)</label>
        <input type="number" id="budget" placeholder="400000">
    </div>

    <div id="leaseSection">
        <label>Maks. leasing pr. måned</label>
        <input type="number" id="leaseBudget" placeholder="5000">
    </div>
</section>

<section class="question-card">
    <h2>⚡ Drivlinje</h2>

    <select id="fuel">
        <option value="Elbil">Elbil</option>
        <option value="Hybrid">Hybrid</option>
        <option value="Benzin">Benzin</option>
        <option value="Diesel">Diesel</option>
    </select>
</section>

<section class="question-card">
    <h2>🚚 Trækbehov</h2>

    <select id="towNeed">
        <option value="ingen">Intet behov</option>
        <option value="trailer">Trailer</option>
        <option value="campingvogn">Campingvogn</option>
    </select>
</section>

<section class="question-card">
    <h2>👨‍👩‍👧‍👦 Familie</h2>

    <label>Antal personer</label>
    <input type="number" id="people" min="1" max="9" value="4">

    <label>Bagagebehov</label>
    <select id="baggage">
        <option value="lav">Lav</option>
        <option value="mellem">Mellem</option>
        <option value="høj">Høj</option>
    </select>
</section>

<section class="question-card center">
    <button id="findCarBtn">
        🚗 Find min bil
    </button>
</section>

<section class="results-card">
    <h2>🏆 Dine anbefalinger</h2>
    <div id="resultsContainer">
        Resultater vises her...
    </div>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
