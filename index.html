<!DOCTYPE html><html lang='da'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>V9 Ultimate AI</title><style>body{font-family:Segoe UI;background:#eef2f7;margin:0}header{background:#111827;color:#fff;padding:20px;text-align:center}.w{max-width:1400px;margin:auto;padding:20px}.c{background:#fff;padding:20px;border-radius:12px}.g{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}input,select{width:100%;padding:8px}button{background:#2563eb;color:#fff;border:0;padding:12px;border-radius:8px}.r{background:#ecfeff;padding:15px;border-radius:10px;margin-top:10px}.ai{background:#fef9c3;padding:15px;border-radius:10px;margin:15px 0}@media(max-width:900px){.g{grid-template-columns:1fr}}</style></head><body><header><h1>🚗 BilPortal Danmark V9 Ultimate AI</h1><p>AI-lignende bilrådgiver</p></header><div class='w'><div class='c'><div class='g'><div><label>Km/år <span id=yv>20000</span></label><input id=year type=range min=0 max=100000 step=1000 value=20000 oninput='yv.innerText=value'><label>Pendling</label><input id=pend type=range min=0 max=200 value=30></div><div><label>Budget</label><input id=budget value=450000><label>Leasingbudget</label><input id=lease value=5000></div><div><label>Drivlinje</label><select id=fuel><option>Ligegyldig</option><option>Elbil</option><option>Hybrid</option><option>Benzin</option><option>Diesel</option></select><label>Biltype</label><select id=body><option>Ligegyldig</option><option>SUV</option><option>Stationcar</option><option>Sedan</option></select></div><div><label>Personer</label><select id=people><option>1</option><option>2</option><option>3</option><option>4</option><option selected>5</option><option>6</option><option>7</option></select><label>Træk</label><select id=tow><option>Ingen</option><option>Trailer</option><option>Campingvogn</option></select></div></div><br><button onclick='runAI()'>Find min bil</button><div id=ai></div><div id=out></div></div></div><script>const cars=[['Tesla','Model Y','Elbil','SUV',339990,622,1600,'https://www.tesla.com/da_dk/modely'],['Skoda','Enyaq','Elbil','SUV',349995,580,1200,'https://www.skoda.dk'],['VW','ID.4','Elbil','SUV',329995,550,1400,'https://www.volkswagen.dk'],['Toyota','Corolla Hybrid','Hybrid','Stationcar',319990,900,1300,'https://www.toyota.dk'],['Toyota','RAV4 Hybrid','Hybrid','SUV',419990,900,1500,'https://www.toyota.dk'],['Ford','Kuga Hybrid','Hybrid','SUV',359990,850,1500,'https://www.ford.dk'],['Peugeot','5008','Benzin','SUV',389990,800,1500,'https://www.peugeot.dk'],['Dacia','Jogger','Benzin','Stationcar',249990,800,1200,'https://www.dacia.dk'],['Skoda','Octavia Diesel','Diesel','Stationcar',299995,1100,1800,'https://www.skoda.dk'],['VW','Passat Diesel','Diesel','Stationcar',439990,1200,2000,'https://www.volkswagen.dk']];function score(c){let s=50;let km=+year.value;if(c[2]=='Elbil'&&km<35000)s+=25;if(c[2]=='Diesel'&&km>40000)s+=25;if(tow.value=='Campingvogn'&&c[6]>=1500)s+=15;if(body.value=='Ligegyldig'||body.value==c[3])s+=10;if(c[4]<=+budget.value)s+=10;return s;}function runAI(){let km=+year.value;let advice='';if(km<30000)advice='AI vurderer, at elbiler og hybrider bør prioriteres.';else advice='AI vurderer, at diesel eller effektive hybrider bør undersøges.';ai.innerHTML='<div class=ai>🤖 '+advice+'</div>';let r=cars.filter(c=>c[4]<=+budget.value);if(fuel.value!='Ligegyldig')r=r.filter(c=>c[2]==fuel.value);r.sort((a,b)=>score(b)-score(a));out.innerHTML=r.map((c,i)=>`<div class=r><h3>#${i+1} ${c[0]} ${c[1]}</h3><p>Type: ${c[2]} | Karrosseri: ${c[3]}</p><p>Pris: ${c[4].toLocaleString('da-DK')} kr.</p><p>Rækkevidde/estimat: ${c[5]} km</p><p>Træk: ${c[6]} kg</p><p><b>Matchscore: ${score(c)}/100</b></p><p><a target='_blank' href='${c[7]}'>🌐 Officiel hjemmeside</a> | <a target='_blank' href='https://fdm.dk/tests'>🧪 FDM</a> | <a target='_blank' href='https://bilmagasinet.dk'>📰 Bilmagasinet</a></p></div>`).join('');}</script></body></html>
